<!DOCTYPE html>
<html>
<head>
    <title>Sumador de Números</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input[type="text"] {
            padding: 5px;
            margin-bottom: 10px;
        }
        input[type="submit"] {
            padding: 5px 15px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Sumador de Números</h1>
    
    <form method="post">
        {% csrf_token %}
        <!-- ENTRADA -->
        I<input type="numberngrese Número 1? " step="any" name="txtNumero1" value="{{ numero1 }}"><br><br>
        Ingrese Número 2? <input type="number" step="any" name="txtNumero2" value="{{ numero2 }}"><br><br>
        <!-- SALIDA -->
        Resultado: <input type="text" name="txtResultado" value="{{ resultado }}" readonly><br><br>
        <!-- ACCION(PROCESO) -->
        <input type="submit" value="SUMAR" name="cmdSumar">
        <input type="submit" value="NUEVO" name="cmdNuevo">
    </form>
</body>
</html>
