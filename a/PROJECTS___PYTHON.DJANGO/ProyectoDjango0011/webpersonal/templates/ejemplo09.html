{% extends 'index.html' %}

{% block title %}Ejemplo 09{% endblock %}

{% block content %} 
<h2>[09] Registrar una consulta (Insert)</h2>
<div class="container mt-4">
    <h2>Registrar Nueva Consulta</h2>
    
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        {% endfor %}
    {% endif %}

    <form method="post" class="mt-4">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group col-md-6">
                <label for="numeroConsulta">Número de Consulta</label>
                <input type="text" class="form-control" id="numeroConsulta" name="numeroConsulta" required>
            </div>
            <div class="form-group col-md-6">
                <label for="fecha">Fecha</label>
                <input type="date" class="form-control" id="fecha" name="fecha" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="nombreMedico">Nombre del Médico</label>
            <input type="text" class="form-control" id="nombreMedico" name="nombreMedico" required>
        </div>
        
        <div class="form-row">
            <div class="form-group col-md-6">
                <label for="deinpr">DEINPR</label>
                <input type="text" class="form-control" id="deinpr" name="deinpr" required>
            </div>
            <div class="form-group col-md-6">
                <label for="procedencia">Procedencia</label>
                <input type="text" class="form-control" id="procedencia" name="procedencia" required>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Registrar Consulta</button>
        <a href="{% url 'listar_consultas' %}" class="btn btn-secondary ml-2">Ver Todas las Consultas</a>
    </form>
</div>
{% endblock %}
